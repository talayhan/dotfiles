<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180" role="img" aria-label="dotfiles">
  <rect x="1" y="1" width="758" height="178" rx="18" fill="#141516" stroke="#2c2e2a"/>

  <!-- mark: three machines linked to one config source -->
  <g stroke="#5c6156" stroke-width="2" fill="none">
    <path d="M 100 90 L 56 52"/>
    <path d="M 100 90 L 56 128"/>
    <path d="M 100 90 L 148 90"/>
  </g>
  <g stroke="#d98a44" stroke-width="2.5" fill="none" stroke-dasharray="1 7" stroke-linecap="round">
    <path d="M 100 90 L 56 52"/>
    <path d="M 100 90 L 56 128"/>
    <path d="M 100 90 L 148 90"/>
  </g>

  <circle cx="100" cy="90" r="16" fill="#d98a44"/>
  <circle cx="100" cy="90" r="5" fill="#141516"/>

  <circle cx="56" cy="52" r="9" fill="#0d0e0f" stroke="#3a3c36" stroke-width="2"/>
  <circle cx="56" cy="128" r="9" fill="#0d0e0f" stroke="#3a3c36" stroke-width="2"/>
  <circle cx="148" cy="90" r="9" fill="#0d0e0f" stroke="#3a3c36" stroke-width="2"/>

  <g transform="translate(200,0)">
    <text x="0" y="88" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="46" font-weight="700" fill="#dfe2d8">dot<tspan fill="#d98a44">files</tspan></text>
    <text x="2" y="112" font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="14" letter-spacing="1.5" fill="#7d8177">talayhan</text>
  </g>
</svg>
